<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Consulta de Calificaciones - Colegio Niños Héroes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul-id: #193E9A; --verde-id: #317F77; }
        
        /* NAV ESTILO IMAGEN */
        .navbar { padding: 15px 40px; background: #fff; border-bottom: 1px solid #eee; }
        .navbar-brand { display: flex; align-items: center; font-weight: 800; color: var(--azul-id) !important; font-size: 1.6rem; }
        .logo-nav { height: 40px; margin-right: 15px; }
        .btn-volver { border: 1.5px solid var(--azul-id); color: var(--azul-id); font-weight: 600; border-radius: 12px; padding: 6px 25px; text-decoration: none !important; transition: 0.3s; }
        .btn-volver:hover { background: var(--azul-id); color: white !important; }

        /* HERO BANNER DEGRADADO */
        .hero-banner { background: linear-gradient(90deg, #193E9A 0%, #317F77 100%); padding: 60px 20px; text-align: center; color: white; }
        .hero-banner h1 { font-weight: 800; font-size: 3rem; margin-bottom: 10px; }
        
        /* BUSCADOR */
        .search-container { max-width: 600px; margin: -30px auto 40px; }
        .input-group { box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-radius: 50px; overflow: hidden; background: white; }
        #matriculaInput { border: none; padding-left: 30px; height: 60px; font-size: 1.1rem; }
        .btn-buscar { background: var(--verde-id) !important; color: white !important; border: none !important; padding: 0 40px; font-weight: 800; }

        /* BOLETA DISEÑO LIMPIO */
        .report-card-container { background: white; padding: 40px; border: 1px solid #ccc; margin: 0 auto 50px; max-width: 850px; display: none; color: #000; }
        .header-boleta { border-bottom: 2px solid var(--azul-id); padding-bottom: 10px; margin-bottom: 20px; }
        .school-name { color: var(--azul-id); font-weight: 700; font-size: 1.8rem; margin: 0; text-transform: uppercase; }
        
        .final-box { border: 1.5px solid var(--azul-id); background: #f1f6ff; padding: 10px; text-align: center; min-width: 140px; float: right; }
        .final-value { font-size: 2rem; font-weight: 900; line-height: 1; }

        .info-section { border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 12px 0; margin-bottom: 20px; font-size: 0.9rem; }
        .info-label { font-weight: 800; margin-right: 10px; }

        .grade-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .grade-table th { background: #455a64; color: white; border: 1px solid #000; padding: 8px; font-size: 0.8rem; text-align: center; }
        .grade-table td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 0.9rem; }
        .grade-table .subject-col { text-align: left; font-weight: 700; background: #fafafa; padding-left: 15px; }

        .signature-section { margin-top: 60px; display: flex; justify-content: space-around; }
        .sign-box { border-top: 1px solid #000; width: 220px; text-align: center; font-size: 0.8rem; font-weight: 800; padding-top: 5px; }

        @media print {
            .no-print, .hero-banner, .search-container, .navbar { display: none !important; }
            .report-card-container { display: block !important; border: none; margin: 0; width: 100%; max-width: 100%; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body>

    <nav class="navbar no-print">
        <div class="navbar-brand"><img src="Iconos/logo.png" class="logo-nav"> Colegio Niños Héroes</div>
        <a href="index.html" class="btn-volver">← Volver</a>
    </nav>

    <div class="hero-banner no-print">
        <div class="container">
            <h1>Boleta de Calificaciones</h1>
            <p>Consulta oficial del ciclo escolar.</p>
        </div>
    </div>

    <div class="container search-container no-print">
        <div class="input-group">
            <input type="text" id="matriculaInput" class="form-control" placeholder="Escriba la matrícula...">
            <div class="input-group-append"><button class="btn btn-buscar" onclick="buscarBoletas()">BUSCAR</button></div>
        </div>
        <div id="statusMsg" class="text-center mt-3 font-weight-bold"></div>
        <div class="text-center mt-3" id="printBtnContainer" style="display:none;">
            <button class="btn btn-danger btn-lg shadow" onclick="window.print()"><i class="fas fa-file-pdf mr-2"></i> DESCARGAR PDF</button>
        </div>
    </div>

    <div id="reportCardExtra" class="report-card-container"></div>
    <div id="reportCardIngles" class="report-card-container page-break"></div>

<script>
    const idExtra = '12m7RYtCBAF-P6t8_hoS3TkJwVX0tHEf7uaHAs6m0pTs';
    const idIngles = '1EY955TiJLZtpffxAtNQW3bjVuw8vHfYm_JYhX_6hXd4';
    
    const niveles = [
        'Maternal', 'Kinder 1', 'Kinder 2', 'Kinder 3', 
        'Primaria 1', 'Primaria 2', 'Primaria 3', 'Primaria 4', 'Primaria 5', 'Primaria 6',
        'Secundaria 1', 'Secundaria 2', 'Secundaria 3',
        'Preparatoria 1', 'Preparatoria 2', 'Preparatoria 3'
    ];

    const MATERIAS_MAP = {
        ingles: (n) => n.toLowerCase().includes('maternal') || n.toLowerCase().includes('kinder') ? ['LISTENING', 'READING'] : ['LISTENING', 'READING', 'WRITING', 'SPEAKING', 'COMPOSITION'],
        extra: (n) => {
            const nl = n.toLowerCase();
            if (nl.includes('maternal') || nl.includes('kinder')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'EMOCIONES'];
            if (nl.includes('primaria 1') || nl.includes('primaria 2')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA', 'LECTURA', 'SPELLING BEE'];
            if (nl.includes('primaria')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA'];
            if (nl.includes('secundaria 2')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'ORTOGRAFÍA', 'SISTÉMICA'];
            if (nl.includes('secundaria')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'SISTÉMICA'];
            if (nl.includes('preparatoria')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA'];
            return [];
        }
    };

    const fmt = (v) => {
        if (v === undefined || v === null || v === "" || isNaN(v)) return '-';
        return (Math.floor(parseFloat(v) * 10) / 10).toFixed(1);
    };

    async function buscarBoletas() {
        const mat = document.getElementById('matriculaInput').value.trim().toUpperCase();
        const status = document.getElementById('statusMsg');
        if (!mat) { status.innerText = "Ingrese matrícula."; return; }

        status.innerHTML = "Buscando...";
        const [dEx, dIn] = await Promise.all([obtenerDatos(idExtra, mat, 'extra'), obtenerDatos(idIngles, mat, 'ingles')]);

        if (dEx || dIn) {
            status.innerHTML = "<span class='text-success'>¡Éxito!</span>";
            document.getElementById('printBtnContainer').style.display = 'block';
            if (dEx) renderBoleta(dEx, 'Extra', 'EXTRACURRICULARES');
            if (dIn) renderBoleta(dIn, 'Ingles', 'ENGLISH DEPARTMENT');
        } else {
            status.innerHTML = "<span class='text-danger'>Matrícula no encontrada.</span>";
            document.getElementById('printBtnContainer').style.display = 'none';
        }
    }

    async function obtenerDatos(sheetId, mat, tipo) {
        for (let nivel of niveles) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(nivel)}&tqx=cb:${Date.now()}`;
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const data = Papa.parse(csv, {header: false, skipEmptyLines: true}).data;
                
                // Buscar fila de 'Matricula' (usualmente fila 2, índice 1)
                const hIdx = data.findIndex(r => r.some(c => c && c.toString().toLowerCase().includes('matricula')));
                if (hIdx === -1) continue;

                // Las materias están arriba de Matrícula (fila 1, índice 0)
                const rowMaterias = data[hIdx - 1] || []; 
                const studentRow = data.find(r => r.some(c => c && c.toString().trim().toUpperCase() === mat));

                if (studentRow) {
                    const esPrepa = nivel.toLowerCase().includes('preparatoria');
                    const jump = esPrepa ? 3 : 4;
                    const filtro = MATERIAS_MAP[tipo](nivel);
                    let listaMaterias = [];
                    
                    // Empezamos en columna F (índice 5)
                    for (let i = 5; i < studentRow.length; i++) {
                        let nombre = "";
                        // Buscar nombre hacia atrás (celdas combinadas)
                        for (let j = i; j >= 5; j--) { if (rowMaterias[j]) { nombre = rowMaterias[j].trim(); break; } }
                        
                        if (nombre && filtro.includes(nombre.toUpperCase())) {
                            listaMaterias.push({
                                n: nombre,
                                v1: fmt(studentRow[i]),
                                v2: fmt(studentRow[i+1]),
                                v3: esPrepa ? null : fmt(studentRow[i+2]),
                                vf: esPrepa ? fmt(studentRow[i+2]) : fmt(studentRow[i+3])
                            });
                            i += (jump - 1);
                        }
                    }
                    let pf = "-";
                    for (let k = studentRow.length - 1; k >= 5; k--) { if (studentRow[k] && !isNaN(studentRow[k])) { pf = fmt(studentRow[k]); break; } }
                    return { nombre: studentRow[1], mat: studentRow[0], ciclo: studentRow[2], grado: studentRow[3], grupo: studentRow[4], nivel, materias: listaMaterias, pf, esPrepa };
                }
            } catch (e) { console.error(e); }
        }
        return null;
    }

    function renderBoleta(d, idS, tit) {
        const div = document.getElementById(`reportCard${idS}`);
        div.style.display = 'block';
        div.innerHTML = `
            <div class="header-boleta">
                <div class="final-box"><div class="final-label">PROMEDIO</div><div class="final-value">${d.pf}</div></div>
                <img src="Iconos/logo.png" style="height: 55px;">
                <h2 class="school-name">COLEGIO NIÑOS HÉROES</h2>
                <div style="font-weight:800; margin-top:10px;">${tit}</div>
            </div>
            <div class="info-section">
                <div class="row">
                    <div class="col-7"><b>ALUMNO:</b> ${d.nombre}</div>
                    <div class="col-5"><b>GRADO:</b> ${d.grado} ${d.grupo}</div>
                    <div class="col-7"><b>MATRÍCULA:</b> ${d.mat}</div>
                    <div class="col-5"><b>CICLO:</b> ${d.ciclo}</div>
                </div>
            </div>
            <table class="grade-table">
                <thead><tr><th style="text-align:left; padding-left:15px;">MATERIAS</th>${d.esPrepa ? '<th>SEM 1</th><th>SEM 2</th>' : '<th>1er T</th><th>2do T</th><th>3er T</th>'}<th>FINAL</th></tr></thead>
                <tbody>${d.materias.map(m => `<tr><td class="subject-col">${m.n}</td><td>${m.v1}</td><td>${m.v2}</td>${!d.esPrepa ? `<td>${m.v3}</td>` : ''}<td style="font-weight:900; background:#eee;">${m.vf}</td></tr>`).join('')}</tbody>
            </table>
            <div class="signature-section"><div class="sign-box">DIRECTOR</div><div class="sign-box">DIRECTORA</div></div>
        `;
    }
</script>
</body>
</html>
