<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Calificaciones - Colegio Niños Héroes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-id: #193E9A;
            --verde-id: #317F77;
        }

        /* --- DISEÑO DE BÚSQUEDA ORIGINAL --- */
        .navbar-brand { display: flex; align-items: center; font-weight: 800; color: var(--azul-id) !important; font-size: 1.5rem; }
        .btn-volver { border: 2px solid var(--azul-id); color: var(--azul-id); font-weight: 700; border-radius: 10px; padding: 5px 20px; transition: 0.3s; text-decoration: none !important; }
        .btn-volver:hover { background: var(--azul-id); color: white !important; }
        .nav-gradient-line { height: 8px; background: linear-gradient(135deg, #193E9A 0%, #317F77 100%); width: 100%; margin-top: 12px; }
        .hero { background: linear-gradient(135deg, #193E9A 0%, #317F77 100%); padding: 40px 0; text-align: center; color: white; }
        .hero h1 { font-weight: 800; font-size: 2.5rem; }
        .instruccion { color: #555; font-weight: 500; margin-bottom: 15px; }
        .input-group { box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 30px; overflow: hidden; }
        #matriculaInput { border-radius: 30px 0 0 30px; border: 1px solid #ddd; padding-left: 25px; height: 55px; }
        .btn-buscar { background-color: var(--verde-id) !important; color: white !important; border-radius: 0 30px 30px 0 !important; padding: 0 35px !important; font-weight: 800 !important; border: none !important; }

        /* --- DISEÑO DE BOLETA ACTUALIZADO --- */
        .report-card-container {
            background: white;
            padding: 30px;
            border: 1px solid #333;
            margin: 20px auto;
            max-width: 850px;
            display: none;
            color: #000;
        }

        .header-boleta { border-bottom: 2px solid var(--azul-id); margin-bottom: 15px; }
        .nombre-colegio { color: var(--azul-id); font-weight: 800; font-size: 1.6rem; margin: 0; text-transform: uppercase; }
        .boleta-titulo { font-size: 1.1rem; font-weight: 700; color: #333; margin-top: 5px; }

        .final-box { border: 2px solid var(--azul-id); background: #f0f4f8; padding: 5px 15px; text-align: center; min-width: 120px; }
        .final-label { font-size: 0.7rem; font-weight: 800; }
        .final-value { font-size: 1.8rem; font-weight: 900; }

        .info-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 5px; border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 10px 0; margin-bottom: 15px; }
        .info-item { font-size: 0.9rem; }
        .info-label { font-weight: 800; text-transform: uppercase; margin-right: 5px; }

        .grade-table { width: 100%; border-collapse: collapse; }
        .grade-table th { background: #455a64; color: white; border: 1px solid #000; padding: 6px; font-size: 0.8rem; text-transform: uppercase; }
        .grade-table td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 0.9rem; }
        .grade-table .materia-td { text-align: left; font-weight: 700; background: #f9f9f9; }

        .firma-row { margin-top: 40px; display: flex; justify-content: space-around; }
        .firma-box { border-top: 1px solid #000; width: 200px; text-align: center; font-size: 0.8rem; font-weight: 800; padding-top: 5px; }

        @media print {
            .no-print, .hero, .nav-gradient-line, .navbar, .instruccion, #statusMsg, #printBtnContainer { display: none !important; }
            body { background: white; }
            .report-card-container { display: block !important; border: none; margin: 0; width: 100%; max-width: 100%; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white no-print">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="#"><img src="Iconos/logo.png" style="height: 50px; margin-right: 10px;"> Colegio Niños Héroes</a>
            <a href="index.html" class="btn-volver">← Volver</a>
        </div>
    </nav>
    <div class="nav-gradient-line no-print"></div>

    <div class="hero no-print">
        <div class="container"><h1>Boleta de Calificaciones</h1></div>
    </div>

    <div class="container mt-5 no-print">
        <div class="row justify-content-center mb-5">
            <div class="col-md-6 text-center">
                <p class="instruccion">Ingrese la matrícula del alumno:</p>
                <div class="input-group">
                    <input type="text" id="matriculaInput" class="form-control" placeholder="Matrícula...">
                    <div class="input-group-append">
                        <button class="btn btn-buscar" onclick="buscarBoletas()">Buscar</button>
                    </div>
                </div>
                <div id="statusMsg" class="mt-3 font-weight-bold"></div>
                <div class="mt-3" id="printBtnContainer" style="display:none;">
                    <button class="btn btn-danger btn-lg" onclick="window.print()"><i class="fas fa-file-pdf mr-2"></i> Descargar PDF</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reportCardExtra" class="report-card-container"></div>
    <div id="reportCardIngles" class="report-card-container page-break"></div>

<script>
    const idExtra = '12m7RYtCBAF-P6t8_hoS3TkJwVX0tHEf7uaHAs6m0pTs';
    const idIngles = '1EY955TiJLZtpffxAtNQW3bjVuw8vHfYm_JYhX_6hXd4';
    
    const niveles = [
        'Maternal', 'Kinder 1', 'Kinder 2', 'Kinder 3', 
        'Primaria 1', 'Primaria 2', 'Primaria 3', 'Primaria 4', 'Primaria 5', 'Primaria 6',
        'Secundaria 1', 'Secundaria 2', 'Secundaria 3',
        'Preparatoria 1', 'Preparatoria 2', 'Preparatoria 3'
    ];

    const MATERIAS_MAP = {
        ingles: (n) => n.includes('Maternal') || n.includes('Kinder') ? ['LISTENING', 'READING'] : ['LISTENING', 'READING', 'WRITING', 'SPEAKING', 'COMPOSITION'],
        extra: (n) => {
            const nl = n.toLowerCase();
            if (nl.includes('maternal') || nl.includes('kinder')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'EMOCIONES'];
            if (nl.includes('primaria 1') || nl.includes('primaria 2')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA', 'LECTURA', 'SPELLING BEE'];
            if (nl.includes('primaria')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'JUEGOS Y DESTREZAS', 'ROBÓTICA', 'EDUCACIÓN FINANCIERA', 'SISTÉMICA'];
            if (nl.includes('secundaria 2')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'ORTOGRAFÍA', 'SISTÉMICA'];
            if (nl.includes('secundaria')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'MÚSICA', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA', 'SISTÉMICA'];
            if (nl.includes('preparatoria')) return ['EDUCACIÓN FISÍCA', 'DANZA', 'ARTES', 'TOCHO BANDERA', 'TAEKWONDO', 'INFORMÁTICA', 'HERRAMIENTAS DIGITALES', 'AJEDREZ', 'ROBÓTICA'];
            return [];
        }
    };

    // Función para truncar a 1 decimal sin redondear
    const fmt = (v) => {
        if (!v || isNaN(v)) return '-';
        return (Math.floor(parseFloat(v) * 10) / 10).toFixed(1);
    };

    async function buscarBoletas() {
        const mat = document.getElementById('matriculaInput').value.trim().toUpperCase();
        const status = document.getElementById('statusMsg');
        if (!mat) { status.innerText = "Ingrese matrícula"; return; }

        status.innerHTML = "Buscando...";
        const dataEx = await obtenerDatos(idExtra, mat, 'extra');
        const dataIn = await obtenerDatos(idIngles, mat, 'ingles');

        if (dataEx || dataIn) {
            status.innerHTML = "<span class='text-success'>Datos encontrados</span>";
            document.getElementById('printBtnContainer').style.display = 'block';
            if (dataEx) renderBoleta(dataEx, 'Extra', 'EXTRACURRICULARES');
            if (dataIn) renderBoleta(dataIn, 'Ingles', 'INGLÉS (ENGLISH DEPARTMENT)');
        } else {
            status.innerHTML = "<span class='text-danger'>No encontrado</span>";
            document.getElementById('reportCardExtra').style.display = 'none';
            document.getElementById('reportCardIngles').style.display = 'none';
        }
    }

    async function obtenerDatos(sheetId, mat, tipo) {
        for (let nivel of niveles) {
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(nivel)}`;
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const data = Papa.parse(csv, {header: false}).data;
                const hIdx = data.findIndex(r => r[0] && r[0].toString().toLowerCase().includes('matricula'));
                if (hIdx === -1) continue;

                const headers = data[hIdx - 1] || [];
                const row = data.find(r => r[0] && r[0].toString().trim().toUpperCase() === mat);

                if (row) {
                    const esPrepa = nivel.toLowerCase().includes('preparatoria');
                    const jump = esPrepa ? 3 : 4;
                    const filtro = MATERIAS_MAP[tipo](nivel);
                    let materias = [];
                    
                    for (let i = 5; i < row.length - 1; i += jump) {
                        let nombre = "";
                        for (let j = i; j >= 5; j--) { if (headers[j]) { nombre = headers[j].trim(); break; } }
                        if (nombre.toUpperCase().includes("PROMEDIO") || !nombre) break;
                        
                        if (filtro.includes(nombre.toUpperCase())) {
                            materias.push({
                                n: nombre,
                                v1: fmt(row[i]),
                                v2: fmt(row[i+1]),
                                v3: esPrepa ? null : fmt(row[i+2]),
                                vf: esPrepa ? fmt(row[i+2]) : fmt(row[i+3])
                            });
                        }
                    }
                    
                    let promFinal = "-";
                    for (let k = row.length - 1; k >= 5; k--) { if (row[k] && !isNaN(row[k])) { promFinal = fmt(row[k]); break; } }

                    return { nombre: row[1], mat: row[0], ciclo: row[2], grado: row[3], grupo: row[4], nivel, materias, promFinal, esPrepa };
                }
            } catch (e) { console.error(e); }
        }
        return null;
    }

    function renderBoleta(d, idSuffix, labelTipo) {
        const container = document.getElementById(`reportCard${idSuffix}`);
        container.style.display = 'block';
        
        container.innerHTML = `
            <div class="header-boleta d-flex justify-content-between align-items-center">
                <div>
                    <img src="Iconos/logo.png" style="height: 60px; margin-bottom: 5px;">
                    <h2 class="nombre-colegio">COLEGIO NIÑOS HÉROES</h2>
                    <div class="boleta-titulo">${labelTipo}</div>
                </div>
                <div class="final-box">
                    <div class="final-label">PROMEDIO FINAL</div>
                    <div class="final-value">${d.promFinal}</div>
                </div>
            </div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">ALUMNO:</span> ${d.nombre}</div>
                <div class="info-item"><span class="info-label">GRADO:</span> ${d.grado}</div>
                <div class="info-item"><span class="info-label">MATRÍCULA:</span> ${d.mat}</div>
                <div class="info-item"><span class="info-label">GRUPO:</span> ${d.grupo}</div>
                <div class="info-item"><span class="info-label">CICLO:</span> ${d.ciclo}</div>
                <div class="info-item"><span class="info-label">NIVEL:</span> ${d.nivel}</div>
            </div>
            <table class="grade-table">
                <thead>
                    <tr>
                        <th style="text-align:left;">ASIGNATURA</th>
                        ${d.esPrepa ? '<th>SEM 1</th><th>SEM 2</th>' : '<th>TRIM 1</th><th>TRIM 2</th><th>TRIM 3</th>'}
                        <th>FINAL</th>
                    </tr>
                </thead>
                <tbody>
                    ${d.materias.map(m => `
                        <tr>
                            <td class="materia-td">${m.n}</td>
                            <td>${m.v1}</td>
                            <td>${m.v2}</td>
                            ${!d.esPrepa ? `<td>${m.v3}</td>` : ''}
                            <td style="font-weight:900;">${m.vf}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <div class="firma-row">
                <div class="firma-box">DIRECTOR(A)</div>
                <div class="firma-box">TITULAR</div>
            </div>
        `;
    }
</script>
</body>
</html>
